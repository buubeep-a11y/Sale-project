<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SteelFlow · Sales Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ===== SteelFlow Design Tokens ===== */
:root {
  --bg: #070d18;
  --bg-elev: #0d1626;
  --bg-card: #111d33;
  --bg-card-2: #16243d;
  --bg-hover: #1a2a45;
  --border: #1f2f4a;
  --border-strong: #2a3d5e;
  --text: #e6edf7;
  --text-dim: #8a9bb8;
  --text-faint: #5d6e8a;
  --cyan: #22d3ee;
  --cyan-glow: rgba(34, 211, 238, 0.18);
  --cyan-deep: #0891b2;
  --amber: #f59e0b;
  --emerald: #10b981;
  --rose: #f43f5e;
  --violet: #8b5cf6;
  --orange: #fb923c;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 30px rgba(0,0,0,0.35);
  --shadow-glow: 0 0 0 1px var(--cyan-glow), 0 8px 40px var(--cyan-glow);

  --font-sans: "Space Grotesk", "Geist", -apple-system, system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "Geist Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.45;
  overflow: hidden;
  background-image:
    radial-gradient(1200px 600px at 20% -10%, rgba(34,211,238,0.06), transparent 60%),
    radial-gradient(900px 500px at 100% 100%, rgba(139,92,246,0.05), transparent 60%),
    linear-gradient(var(--bg), var(--bg));
}

#root { height: 100%; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }

.app {
  display: grid;
  grid-template-columns: 248px 1fr;
  height: 100vh;
}

.sidebar {
  background: linear-gradient(180deg, rgba(13,22,38,0.9), rgba(7,13,24,0.95));
  border-right: 1px solid var(--border);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  padding: 18px 14px;
  position: relative;
  z-index: 10;
}
.sidebar::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(400px 200px at 50% 0%, rgba(34,211,238,0.08), transparent 70%);
  pointer-events: none;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 8px 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
  position: relative;
}
.brand-logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--cyan), var(--cyan-deep));
  border-radius: 9px;
  display: grid; place-items: center;
  box-shadow: 0 0 24px var(--cyan-glow), inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative;
  overflow: hidden;
}
.brand-logo::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent 0 4px, rgba(0,0,0,0.18) 4px 5px);
}
.brand-name { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.brand-sub { font-size: 10px; color: var(--text-faint); font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }

.nav-section-label {
  font-size: 10px; color: var(--text-faint);
  font-family: var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase;
  padding: 14px 10px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 11px;
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 13.5px;
  font-weight: 500;
  width: 100%;
  text-align: left;
  position: relative;
  transition: background .15s ease, color .15s ease, transform .15s ease;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active {
  background: linear-gradient(90deg, rgba(34,211,238,0.12), rgba(34,211,238,0.02));
  color: var(--text);
  box-shadow: inset 1px 0 0 var(--cyan);
}
.nav-item.active::before {
  content: "";
  position: absolute; left: -1px; top: 6px; bottom: 6px;
  width: 2px; background: var(--cyan);
  box-shadow: 0 0 12px var(--cyan);
  border-radius: 2px;
}
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.9; }
.nav-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--bg-card-2);
  color: var(--text-dim);
}
.nav-badge.alert { background: rgba(244,63,94,0.15); color: #fca5b8; }

.sidebar-footer {
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.user-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
}
.avatar {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--violet), var(--cyan));
  border-radius: 50%;
  display: grid; place-items: center;
  font-weight: 700; font-size: 12px;
  color: white;
}
.user-name { font-size: 13px; font-weight: 600; }
.user-role { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }

.main {
  display: flex; flex-direction: column;
  overflow: hidden;
}
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,13,24,0.6);
  backdrop-filter: blur(10px);
  position: relative;
  z-index: 5;
}
.crumbs { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
.crumbs strong { color: var(--text); font-weight: 600; }
.topbar .search {
  flex: 1;
  max-width: 380px;
  margin-left: 14px;
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 7px 12px;
}
.topbar .search input { flex: 1; background: none; border: none; outline: none; font-size: 13px; }
.topbar .search input::placeholder { color: var(--text-faint); }
.topbar .actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  transition: all .15s ease;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
}
.btn:hover { border-color: var(--border-strong); background: var(--bg-hover); }
.btn.primary {
  background: linear-gradient(180deg, var(--cyan), var(--cyan-deep));
  border-color: transparent;
  color: #042330;
  box-shadow: 0 0 0 1px var(--cyan-glow), 0 6px 20px var(--cyan-glow);
}
.btn.primary:hover { transform: translateY(-1px); box-shadow: 0 0 0 1px var(--cyan-glow), 0 10px 30px var(--cyan-glow); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
.btn.ghost:hover { color: var(--text); background: var(--bg-hover); }
.btn.icon { padding: 8px; }

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  display: grid; place-items: center;
  color: var(--text-dim);
  position: relative;
  transition: all .15s ease;
}
.icon-btn:hover { color: var(--text); background: var(--bg-hover); }
.icon-btn .dot {
  position: absolute; top: 5px; right: 5px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--rose);
  box-shadow: 0 0 8px var(--rose);
}

.page {
  flex: 1;
  overflow: auto;
  padding: 24px 28px 40px;
  animation: pageIn .35s cubic-bezier(.2,.7,.2,1);
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.page-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 22px;
  gap: 16px;
}
.page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
.page-sub { color: var(--text-dim); font-size: 13.5px; margin-top: 4px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px;
  box-shadow: var(--shadow-card);
  position: relative;
  transition: border-color .2s ease, transform .2s ease;
}
.card.hover:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.card-title { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
.card-sub { font-size: 11.5px; color: var(--text-faint); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}
.kpi {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px;
  position: relative;
  overflow: hidden;
  transition: all .25s ease;
}
.kpi:hover { border-color: var(--cyan); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
.kpi::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent, var(--cyan)), transparent);
  opacity: 0.7;
}
.kpi-label { font-size: 11.5px; color: var(--text-faint); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.1em; }
.kpi-value { font-size: 30px; font-weight: 700; font-family: var(--font-mono); letter-spacing: -0.02em; margin-top: 8px; }
.kpi-value .unit { font-size: 14px; font-weight: 500; color: var(--text-dim); margin-left: 4px; }
.kpi-foot {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px;
}
.delta {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 12px; font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
}
.delta.up { color: #6ee7b7; background: rgba(16,185,129,0.12); }
.delta.down { color: #fda4af; background: rgba(244,63,94,0.12); }
.delta.flat { color: var(--text-dim); background: var(--bg-card-2); }

.spark { width: 80px; height: 28px; }

.table-wrap { border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; background: var(--bg-card); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left;
  font-size: 11px;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-faint);
  padding: 12px 16px;
  background: var(--bg-elev);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
tbody td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr { transition: background .15s ease; }
tbody tr:hover { background: var(--bg-hover); }
.mono { font-family: var(--font-mono); }
.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
.right { text-align: right; }

.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 11px; font-weight: 600;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  background: var(--bg-card-2);
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge.ok { color: #6ee7b7; background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); }
.badge.warn { color: #fcd34d; background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
.badge.danger { color: #fda4af; background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.3); }
.badge.info { color: #67e8f9; background: rgba(34,211,238,0.1); border-color: rgba(34,211,238,0.3); }
.badge.muted { color: var(--text-dim); }

.bar {
  height: 6px;
  background: var(--bg-card-2);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.bar > div {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--cyan-deep));
  border-radius: 999px;
  transition: width 1s cubic-bezier(.2,.7,.2,1);
  position: relative;
}
.bar > div::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2.5s linear infinite;
}
@keyframes shimmer {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}
.bar.warn > div { background: linear-gradient(90deg, var(--amber), var(--orange)); }
.bar.danger > div { background: linear-gradient(90deg, var(--rose), #be123c); }
.bar.ok > div { background: linear-gradient(90deg, var(--emerald), #047857); }

.chart-card { padding: 20px; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.chart-legend { display: flex; gap: 14px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-dim); font-family: var(--font-mono); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }

.tabs {
  display: inline-flex;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
}
.tabs button {
  padding: 5px 11px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
}
.tabs button.active { background: var(--bg-card); color: var(--text); box-shadow: 0 1px 0 rgba(255,255,255,0.04); }
.tabs button:hover:not(.active) { color: var(--text); }

.grid-2 { display: grid; grid-template-columns: 1.7fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.row { display: flex; gap: 14px; }
.col { display: flex; flex-direction: column; gap: 14px; }
.flex { display: flex; }
.between { justify-content: space-between; }
.center { align-items: center; }
.gap-1 { gap: 6px; } .gap-2 { gap: 10px; } .gap-3 { gap: 14px; }
.mt-1 { margin-top: 6px; } .mt-2 { margin-top: 12px; } .mt-3 { margin-top: 18px; } .mt-4 { margin-top: 24px; }
.mb-1 { margin-bottom: 6px; } .mb-2 { margin-bottom: 12px; } .mb-3 { margin-bottom: 18px; }
.text-dim { color: var(--text-dim); }
.text-faint { color: var(--text-faint); }
.text-mono { font-family: var(--font-mono); }
.text-sm { font-size: 12px; }
.text-lg { font-size: 16px; }
.text-xl { font-size: 20px; }
.font-bold { font-weight: 700; }
.font-semi { font-weight: 600; }
.uppercase { text-transform: uppercase; letter-spacing: 0.08em; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

.toast-wrap {
  position: fixed;
  bottom: 24px; right: 24px;
  display: flex; flex-direction: column;
  gap: 10px;
  z-index: 100;
  pointer-events: none;
}
.toast {
  pointer-events: auto;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  min-width: 280px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  animation: toastIn .3s cubic-bezier(.2,.7,.2,1);
  font-size: 13px;
}
.toast.ok { border-left: 3px solid var(--emerald); }
.toast.info { border-left: 3px solid var(--cyan); }
.toast.warn { border-left: 3px solid var(--amber); }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

.filter-bar {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.chip {
  padding: 6px 12px;
  border-radius: 999px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  transition: all .15s ease;
}
.chip:hover { color: var(--text); border-color: var(--border-strong); }
.chip.active { background: rgba(34,211,238,0.1); color: var(--cyan); border-color: rgba(34,211,238,0.4); }
.chip .count { margin-left: 6px; opacity: 0.7; }

.ring-stat {
  display: grid; place-items: center;
  position: relative;
}
.ring-stat svg { transform: rotate(-90deg); }
.ring-stat .val {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 18px; font-weight: 700;
}

.tip {
  position: absolute;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 11.5px;
  font-family: var(--font-mono);
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  z-index: 50;
  transform: translate(-50%, -110%);
}

.divider { height: 1px; background: var(--border); margin: 14px 0; }
.scroll-list { max-height: 320px; overflow-y: auto; }

.timeline { position: relative; padding-left: 22px; }
.timeline::before {
  content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px;
  width: 2px; background: var(--border);
}
.tl-item { position: relative; padding: 8px 0 14px; }
.tl-item::before {
  content: "";
  position: absolute; left: -19px; top: 12px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 0 3px var(--bg), 0 0 12px var(--cyan-glow);
}
.tl-item.muted::before { background: var(--text-faint); box-shadow: 0 0 0 3px var(--bg); }
.tl-item.warn::before { background: var(--amber); box-shadow: 0 0 0 3px var(--bg), 0 0 12px rgba(245,158,11,0.4); }
.tl-item.ok::before { background: var(--emerald); box-shadow: 0 0 0 3px var(--bg), 0 0 12px rgba(16,185,129,0.4); }

.cust-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px;
  border-radius: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  transition: all .2s ease;
  cursor: pointer;
}
.cust-card:hover { border-color: var(--border-strong); transform: translateX(2px); }
.cust-avatar {
  width: 38px; height: 38px;
  border-radius: 8px;
  display: grid; place-items: center;
  font-weight: 700; font-size: 13px;
  color: white;
  background: linear-gradient(135deg, var(--cyan), var(--cyan-deep));
  flex-shrink: 0;
}

.count-up { display: inline-block; }

.fadeIn { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>

<script type="text/babel">

const CountUp = ({ value, duration = 900, format = (n) => n.toLocaleString(), suffix = "", prefix = "" }) => {
  const [v, setV] = React.useState(0);
  React.useEffect(() => {
    const t0 = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - t0) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(value * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
      else setV(value);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value, duration]);
  return <span className="count-up">{prefix}{format(v)}{suffix}</span>;
};

window.__toasts = { items: [], listeners: [] };
window.toast = (msg, kind = "info") => {
  const id = Math.random().toString(36).slice(2);
  window.__toasts.items.push({ id, msg, kind });
  window.__toasts.listeners.forEach(fn => fn());
  setTimeout(() => {
    window.__toasts.items = window.__toasts.items.filter(t => t.id !== id);
    window.__toasts.listeners.forEach(fn => fn());
  }, 3200);
};

const ToastHost = () => {
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    window.__toasts.listeners.push(force);
    return () => { window.__toasts.listeners = window.__toasts.listeners.filter(f => f !== force); };

// Charts
function smoothPath(pts) {
  if (pts.length < 2) return "";
  let d = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i - 1] || pts[i];
    const p1 = pts[i];
    const p2 = pts[i + 1];
    const p3 = pts[i + 2] || p2;
    const c1x = p1.x + (p2.x - p0.x) / 6;
    const c1y = p1.y + (p2.y - p0.y) / 6;
    const c2x = p2.x - (p3.x - p1.x) / 6;
    const c2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

const BarChart = ({ data, yKey = "sales", xKey = "m", height = 240, color = "#22d3ee", unit = "" }) => {
  const [hover, setHover] = React.useState(null);
  const W = 100;
  const padL = 6, padR = 4, padT = 6, padB = 12;
  const innerW = W - padL - padR;
  const innerH = height - padT - padB;
  const max = Math.max(...data.map(d => d[yKey])) * 1.15;
  const bw = innerW / data.length * 0.6;
  const gap = innerW / data.length * 0.4;
  const step = innerW / data.length;

  return (
    <div style={{position:'relative'}}>
      <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" style={{width:'100%', height, overflow:'visible'}}>
        <defs>
          <linearGradient id="barGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.95"/>
            <stop offset="100%" stopColor={color} stopOpacity="0.25"/>
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((p, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * p} y2={padT + innerH * p} stroke="#1f2f4a" strokeWidth="0.15" strokeDasharray="0.5 0.5"/>
        ))}
        {data.map((d, i) => {
          const v = d[yKey];
          const h = (v / max) * innerH;
          const x = padL + i * step + gap / 2;
          const y = padT + innerH - h;
          return (
            <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{cursor:'pointer'}}>
              <rect
                x={x} y={y} width={bw} height={h}
                fill="url(#barGrad)"
                rx="0.4"
                style={{opacity: hover === i ? 1 : 0.85, transition:'opacity .15s ease'}}
              />
            </g>
          );
        })}
        {data.map((d, i) => (
          <text key={i} x={padL + i * step + step/2} y={height - 3} fontSize="2.4" fill="#5d6e8a" textAnchor="middle" fontFamily="JetBrains Mono">
            {d[xKey]}
          </text>
        ))}
      </svg>
      {hover !== null && (
        <div className="tip" style={{left: `${((hover + 0.5) / data.length) * 100}%`, top: 8}}>
          <div style={{fontSize:11, color:'#8a9bb8'}}>{data[hover][xKey]}</div>
          <div style={{color:'#e6edf7', fontWeight:600, fontSize:13}}>{data[hover][yKey].toFixed(1)}{unit}</div>
        </div>
      )}
    </div>
  );
};

const AreaChart = ({ data, yKey = "sales", xKey = "m", height = 240, color = "#22d3ee", filled = true, unit = "" }) => {
  const [hover, setHover] = React.useState(null);
  const W = 100;
  const padL = 6, padR = 4, padT = 8, padB = 12;
  const innerW = W - padL - padR;
  const innerH = height - padT - padB;
  const max = Math.max(...data.map(d => d[yKey])) * 1.15;
  const min = Math.min(...data.map(d => d[yKey])) * 0.6;
  const range = max - min || 1;
  const step = innerW / (data.length - 1);

  const pts = data.map((d, i) => ({
    x: padL + i * step,
    y: padT + innerH - ((d[yKey] - min) / range) * innerH,
  }));
  const path = smoothPath(pts);
  const areaPath = path + ` L ${pts[pts.length-1].x} ${padT + innerH} L ${pts[0].x} ${padT + innerH} Z`;

  return (
    <div style={{position:'relative'}}>
      <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" style={{width:'100%', height, overflow:'visible'}}>
        <defs>
          <linearGradient id="areaGrad" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.4"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {[0, 0.25, 0.5, 0.75, 1].map((p, i) => (
          <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * p} y2={padT + innerH * p} stroke="#1f2f4a" strokeWidth="0.15" strokeDasharray="0.5 0.5"/>
        ))}
        {filled && <path d={areaPath} fill="url(#areaGrad)"/>}
        <path d={path} fill="none" stroke={color} strokeWidth="0.5" strokeLinecap="round"/>
        {pts.map((p, i) => (
          <circle
            key={i}
            cx={p.x} cy={p.y} r={hover === i ? 1.2 : 0.7}
            fill={color}
            stroke="#070d18" strokeWidth="0.3"
            onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
            style={{cursor:'pointer', transition:'r .15s ease'}}
          />
        ))}
      </svg>
      {hover !== null && (
        <div className="tip" style={{left: `${((hover) / (data.length - 1)) * 100}%`, top: 8}}>
          <div style={{fontSize:11, color:'#8a9bb8'}}>{data[hover][xKey]}</div>
          <div style={{color:'#e6edf7', fontWeight:600, fontSize:13}}>{data[hover][yKey].toFixed(1)}{unit}</div>
        </div>
      )}
    </div>
  );
};

const MixedChart = ({ data, barKey, lineKey, xKey = "m", height = 240, barColor = "#8b5cf6", lineColor = "#22d3ee" }) => {
  const W = 100;
  const padL = 6, padR = 4, padT = 8, padB = 12;
  const innerW = W - padL - padR;
  const innerH = height - padT - padB;
  const maxBar = Math.max(...data.map(d => d[barKey])) * 1.15;
  const maxLine = Math.max(...data.map(d => d[lineKey])) * 1.15;
  const bw = innerW / data.length * 0.4;
  const gap = innerW / data.length * 0.6;
  const step = innerW / data.length;

  const pts = data.map((d, i) => ({
    x: padL + i * step + step/2,
    y: padT + innerH - ((d[lineKey] / maxLine) * innerH),
  }));
  const linePath = smoothPath(pts);

  return (
    <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" style={{width:'100%', height}}>
      <defs>
        <linearGradient id="mixGrad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={barColor} stopOpacity="0.4"/>
          <stop offset="100%" stopColor={barColor} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0, 0.25, 0.5, 0.75, 1].map((p, i) => (
        <line key={i} x1={padL} x2={W - padR} y1={padT + innerH * p} y2={padT + innerH * p} stroke="#1f2f4a" strokeWidth="0.15" strokeDasharray="0.5 0.5"/>
      ))}
      {data.map((d, i) => {
        const h = (d[barKey] / maxBar) * innerH;
        const x = padL + i * step + gap / 2;
        const y = padT + innerH - h;
        return (
          <rect key={i} x={x} y={y} width={bw} height={h} fill={barColor} rx="0.3" opacity="0.7"/>
        );
      })}
      <path d={linePath} fill="none" stroke={lineColor} strokeWidth="0.6" strokeLinecap="round"/>
      {data.map((d, i) => (
        <text key={i} x={padL + i * step + step/2} y={height - 3} fontSize="2.4" fill="#5d6e8a" textAnchor="middle" fontFamily="JetBrains Mono">
          {d[xKey]}
        </text>
      ))}
    </svg>
  );
};

const Donut = ({ data, size = 200, thickness = 40 }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  let angle = -Math.PI / 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {data.map((d, i) => {
        const slice = (d.value / total) * 2 * Math.PI;
        const r = size / 2;
        const innerR = r - thickness;
        const x1 = r + innerR * Math.cos(angle);
        const y1 = r + innerR * Math.sin(angle);
        const x2 = r + r * Math.cos(angle);
        const y2 = r + r * Math.sin(angle);
        angle += slice;
        const x3 = r + r * Math.cos(angle);
        const y3 = r + r * Math.sin(angle);
        const x4 = r + innerR * Math.cos(angle);
        const y4 = r + innerR * Math.sin(angle);
        const largeArc = slice > Math.PI ? 1 : 0;
        const d_str = `M ${x2} ${y2} A ${r} ${r} 0 ${largeArc} 1 ${x3} ${y3} L ${x4} ${y4} A ${innerR} ${innerR} 0 ${largeArc} 0 ${x1} ${y1} Z`;
        return <path key={i} d={d_str} fill={d.color} opacity="0.85"/>;
      })}
    </svg>
  );
};

const Sparkline = ({ data, color = "#22d3ee", width = 80, height = 28 }) => {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => ({
    x: (i / (data.length - 1)) * (width - 4) + 2,
    y: height - 4 - ((v - min) / range) * (height - 8),
  }));
  const path = smoothPath(pts);
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{width, height}}>
      <path d={path} fill="none" stroke={color} strokeWidth="1" strokeLinecap="round" opacity="0.7"/>
    </svg>
  );
};

// CSV Parser
const parseCSV = (text) => {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim());
  const rows = lines.slice(1).map(line => {
    const values = line.split(',').map(v => v.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = values[i] || '');
    return obj;
  });
  return { headers, rows };
};

const ImportPage = () => {
  const [importType, setImportType] = React.useState("products");
  const [csvText, setCsvText] = React.useState("");
  const [preview, setPreview] = React.useState(null);
  const [fileName, setFileName] = React.useState("");

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = (event) => {
      const text = event.target.result;
      setCsvText(text);
      try {
        const { headers, rows } = parseCSV(text);
        setPreview({ headers, rows: rows.slice(0, 5), total: rows.length });
      } catch (err) {
        window.toast("Error parsing CSV: " + err.message, "warn");
      }
    };
    reader.readAsText(file);
  };

  const handleImport = async () => {
    if (!preview) {
      window.toast("Please select a file first", "warn");
      return;
    }

    try {
      const { headers, rows } = parseCSV(csvText);

      if (importType === "products") {
        const products = rows.map((row, i) => ({
          code: row.code || row.Code || row.sku || row.SKU || `SKU-${i}`,
          name: row.name || row.Name || "",
          category: row.category || row.Category || "",
          size: row.size || row.Size || row.grade || row.Grade || "",
          unit: row.unit || row.Unit || "pcs",
          price_per_unit: parseFloat(row.price_per_unit || row.price || row.Price || 0),
          stock_qty: parseFloat(row.stock_qty || row.stock || row.Stock || 0),
          min_stock: parseInt(row.min_stock || row.lowAt || row.low_at || 50),
        }));

        const result = await supabaseHelpers.insertProducts(products);
        if (result.success) {
          window.toast(`✓ Imported ${products.length} products to Supabase!`, "ok");
        } else {
          window.toast(`Error: ${result.error}`, "warn");
        }
      } else {
        const customers = rows.map((row, i) => ({
          code: row.code || row.Code || row.id || row.ID || `C-${String(i).padStart(4, '0')}`,
          name: row.name || row.Name || "",
          phone: row.phone || row.Phone || "",
          address: row.address || row.Address || "",
        }));

        const result = await supabaseHelpers.insertCustomers(customers);
        if (result.success) {
          window.toast(`✓ Imported ${customers.length} customers to Supabase!`, "ok");
        } else {
          window.toast(`Error: ${result.error}`, "warn");
        }
      }

      setCsvText("");
      setPreview(null);
      setFileName("");
    } catch (err) {
      window.toast("Error importing data: " + err.message, "warn");
    }
  };

  const downloadTemplate = () => {
    let csv = "";
    if (importType === "products") {
      csv = "code,name,category,size,unit,price_per_unit,stock_qty,min_stock\n";
      csv += "RB-DB10-SD40,Deformed Bar DB10,Rebar,SD40,ton,24800,100,50\n";
      csv += "HB-H200-SS400,H-Beam 200×200,Beams,SS400,pcs,8400,200,100\n";
    } else {
      csv = "code,name,phone,address\n";
      csv += "C-0001,Bangkok Construction Co.,02-555-1842,123 Sukhumvit Rd, Bangkok\n";
      csv += "C-0002,Siam Steel Builders,02-512-7733,456 Rama 9 Rd, Bangkok\n";
    }

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${importType}_template.csv`;
    a.click();
  };

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">Data Import</div>
          <div className="page-sub">Upload CSV files to import products and customers</div>
        </div>
      </div>

      <div style={{maxWidth:800}}>
        {/* Import Type Selector */}
        <div className="card mb-3">
          <div className="card-title mb-3">Select Data Type</div>
          <div style={{display:'flex', gap:12}}>
            {["products", "customers"].map(type => (
              <button
                key={type}
                onClick={() => {
                  setImportType(type);
                  setCsvText("");
                  setPreview(null);
                  setFileName("");
                }}
                style={{
                  flex:1, padding:'12px 16px', border:'1px solid var(--border)',
                  borderRadius:10, background: importType === type ? 'rgba(34,211,238,0.1)' : 'var(--bg-card)',
                  color: importType === type ? 'var(--cyan)' : 'var(--text-dim)',
                  fontWeight:600, cursor:'pointer', transition:'all .2s ease',
                  borderColor: importType === type ? 'var(--cyan)' : 'var(--border)'
                }}
              >
                {type === "products" ? "📦 Products" : "👥 Customers"}
              </button>
            ))}
          </div>
        </div>

        {/* File Upload */}
        <div className="card mb-3">
          <div className="card-title mb-3">Upload CSV File</div>
          <div style={{
            padding:'32px', border:'2px dashed var(--border)', borderRadius:10,
            textAlign:'center', background:'var(--bg-elev)', cursor:'pointer',
            transition:'all .2s ease'
          }} onClick={() => document.getElementById('csv-input').click()}>
            <Icon name="download" size={32} style={{marginBottom:12, opacity:0.7}}/>
            <div className="text-lg font-semi">Click to upload</div>
            <div className="text-sm text-faint">or drag CSV file here</div>
            {fileName && <div className="text-sm" style={{marginTop:8, color:'var(--cyan)'}}>{fileName}</div>}
          </div>
          <input
            id="csv-input"
            type="file"
            accept=".csv,.xlsx"
            onChange={handleFileChange}
            style={{display:'none'}}
          />
          <button
            className="btn ghost"
            onClick={downloadTemplate}
            style={{width:'100%', marginTop:12, justifyContent:'center'}}
          >
            <Icon name="download" size={14}/> Download Template
          </button>
        </div>

        {/* Preview */}
        {preview && (
          <div className="card mb-3">
            <div className="card-title mb-3">
              Preview ({preview.total} total rows, showing first {preview.rows.length})
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%', fontSize:12}}>
                <thead>
                  <tr>
                    {preview.headers.map(h => (
                      <th key={h} style={{padding:'8px 12px', textAlign:'left', background:'var(--bg-elev)', borderBottom:'1px solid var(--border)', fontWeight:600}}>
                        {h}
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {preview.rows.map((row, i) => (
                    <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                      {preview.headers.map(h => (
                        <td key={h} style={{padding:'8px 12px', fontSize:11}}>
                          {row[h] || "-"}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* Actions */}
        {preview && (
          <div style={{display:'flex', gap:12}}>
            <button className="btn" onClick={() => {setCsvText(""); setPreview(null);}} style={{flex:1}}>Cancel</button>
            <button className="btn primary" onClick={handleImport} style={{flex:1}}>
              <Icon name="check" size={14}/> Import {preview.total} Records
            </button>
          </div>
        )}

        {/* Info */}
        <div className="card" style={{marginTop:24, background:'rgba(34,211,238,0.05)', border:'1px solid rgba(34,211,238,0.2)'}}>
          <div className="card-title mb-2">📋 Instructions</div>
          <ul style={{fontSize:13, color:'var(--text-dim)', lineHeight:1.8, paddingLeft:20}}>
            <li>Download the template CSV file above</li>
            <li>Fill in your data (use correct column names)</li>
            <li>Upload the CSV file to preview</li>
            <li>Click Import to save (stored in Supabase)</li>
            <li>Data persists until cleared or exported to Supabase</li>
          </ul>
        </div>
      </div>
    </div>
  );
};

// Main App
const TWEAK_DEFAULTS = { chartType: "area", accentColor: "#22d3ee" };

const App = () => {
  const [page, setPage] = React.useState("dashboard");
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const loadData = async () => {
      try {
        const [products, customers] = await Promise.all([
          supabaseHelpers.getProducts(),
          supabaseHelpers.getCustomers()
        ]);
        if (products.length > 0) localStorage.setItem('steelflow_products', JSON.stringify(products));
        if (customers.length > 0) localStorage.setItem('steelflow_customers', JSON.stringify(customers));
        window.toast('Synced from Supabase · Data loaded successfully', 'ok');
      } catch (e) {
        console.error('Failed to load data:', e);
        window.toast('Using cached data', 'info');
      } finally {
        setLoading(false);
      }
    };
    loadData();
  }, []);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--cyan', t.accentColor);
    const hex = t.accentColor.replace('#','');
    const r = parseInt(hex.slice(0,2),16);
    const g = parseInt(hex.slice(2,4),16);
    const b = parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty('--cyan-glow', `rgba(${r},${g},${b},0.18)`);
  }, [t.accentColor]);

  const renderPage = () => {
    const props = { chartType: t.chartType };
    switch(page) {
      case "dashboard": return <Dashboard {...props}/>;
      case "stock": return <StockPage {...props}/>;
      case "shipping": return <ShippingPage {...props}/>;
      case "orders": return <OrdersPage {...props}/>;
      case "inventory": return <InventoryPage {...props}/>;
      case "statistics": return <StatsPage {...props}/>;
      case "customers": return <CustomersPage {...props}/>;
      case "import": return <ImportPage/>;
      default: return <Dashboard {...props}/>;
    }
  };

  if (loading) {
    return (
      <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', background:'var(--bg)'}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:32, marginBottom:16}}>⚙️</div>
          <div style={{color:'var(--text)', fontSize:18, marginBottom:8}}>Loading SteelFlow...</div>
          <div style={{color:'var(--text-dim)', fontSize:13}}>Syncing from Supabase</div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <Sidebar current={page} onChange={setPage}/>
      <div className="main">
        <Topbar page={page}/>
        <div key={page} style={{flex:1, overflow:'auto'}}>
          {renderPage()}
        </div>
      </div>
      <ToastHost/>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Charts"/>
        <TweakSelect
          label="Chart style"
          value={t.chartType}
          options={[
            { value: 'area', label: 'Area (default)' },
            { value: 'bar', label: 'Bar chart' },
            { value: 'line', label: 'Line only' },
            { value: 'mixed', label: 'Mixed' },
          ]}
          onChange={(v) => setTweak('chartType', v)}
        />
        <TweakSection label="Theme"/>
        <TweakColor
          label="Accent"
          value={t.accentColor}
          options={['#22d3ee', '#8b5cf6', '#10b981', '#f59e0b', '#f43f5e']}
          onChange={(v) => setTweak('accentColor', v)}
        />
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
